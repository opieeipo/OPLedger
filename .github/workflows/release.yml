name: Release

# On a version tag (v*), build the container image, push it to GHCR, and create
# a GitHub Release. The Homebrew formula and Scoop manifest reference the source
# tarball/zip GitHub generates automatically for the tag (see packaging/README.md
# for updating their version + checksum).
on:
  push:
    tags:
      - "v*"

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release
      packages: write   # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ghcr.io/opieeipo/opledger:latest
            ghcr.io/opieeipo/opledger:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
